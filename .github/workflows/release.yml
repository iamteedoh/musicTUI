name: Release

# Manual/emergency releases: push a tag (e.g. `git tag v0.3.0 && git push
# origin v0.3.0`) to build and attach the all-platform binaries. The normal
# path is release-please.yml (merge the release PR); this is the escape hatch.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    uses: ./.github/workflows/build-release.yml
    with:
      tag: ${{ github.ref_name }}
