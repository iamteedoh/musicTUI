name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: musicTUI-linux-amd64
            bridge_bin: player-bridge
            audio_deps: libasound2-dev
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: musicTUI-darwin-arm64
            bridge_bin: player-bridge
            audio_deps: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: musicTUI-darwin-amd64
            bridge_bin: player-bridge
            audio_deps: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: musicTUI-windows-amd64
            bridge_bin: player-bridge.exe
            audio_deps: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: bridge

      - name: Install Linux audio deps
        if: matrix.audio_deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.audio_deps }}

      - name: Build player-bridge (Rust)
        working-directory: bridge
        run: cargo build --bin player-bridge --release

      - name: Embed bridge into Go binary
        shell: bash
        run: |
          mkdir -p bridge-bin
          cp bridge/target/release/${{ matrix.bridge_bin }} bridge-bin/

      - name: Build musicTUI (Go with embedded bridge)
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-s -w" -o musicTUI${EXT} .

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: |
          mkdir -p pkg
          cp musicTUI pkg/
          chmod +x pkg/musicTUI
          cd pkg && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          mkdir -p pkg
          cp musicTUI.exe pkg/
          cd pkg && 7z a ../${{ matrix.artifact }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            musicTUI-linux-amd64.tar.gz
            musicTUI-darwin-arm64.tar.gz
            musicTUI-darwin-amd64.tar.gz
            musicTUI-windows-amd64.zip
