name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: bridge

      - name: Install Linux audio deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      # Build the way a contributor does, so the documented command is the one
      # CI proves works.
      - name: Build (tools/build — bridge + app)
        run: go run ./tools/build

      - name: Check formatting (gofmt)
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        # copylocks is disabled on purpose: the Bubble Tea model (App) is copied
        # by value every frame and embeds a component that holds a sync.RWMutex.
        # That pattern is intentional; all other vet analyzers stay on.
        run: go vet -copylocks=false ./...

      - name: Build
        run: go build ./...

      - name: Test (Go)
        run: go test ./...

      - name: Test (Rust bridge)
        working-directory: bridge
        run: cargo test

  # Windows has no make, and a bare `go build` silently drops the audio engine.
  # Prove the documented build works from a clean clone on the platform where it
  # is easiest to break, so it can't rot unnoticed between releases.
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: bridge

      - name: Build (tools/build — bridge + app)
        run: go run ./tools/build

      - name: Smoke-check the binary
        run: |
          .\dist\musicTUI.exe --version
          if (-not (Test-Path .\bridge-bin\player-bridge.exe)) {
            Write-Error "player-bridge.exe was not embedded — the Windows build would ship without audio"
            exit 1
          }

      - name: Test (Go)
        run: go test ./...

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          /tmp/gitleaks git . --config .gitleaks.toml --redact --no-banner

  community-files:
    name: OSS community & licensing files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Require community health & licensing files
        run: |
          fail=0
          require() { if [ ! -s "$1" ]; then echo "::error::missing or empty: $1"; fail=1; fi; }
          require LICENSE
          require README.md
          require CONTRIBUTING.md
          require CODE_OF_CONDUCT.md
          require SECURITY.md
          require CHANGELOG.md
          require .github/FUNDING.yml
          # Licensing must stay GPL v3.
          if ! grep -q "GNU GENERAL PUBLIC LICENSE" LICENSE || ! grep -q "Version 3" LICENSE; then
            echo "::error::LICENSE is not GNU GPL v3"; fail=1
          fi
          # Funding must declare at least one sponsor/payment link.
          if ! grep -qE '^\s*(github|patreon|open_collective|ko_fi|buy_me_a_coffee|liberapay|custom):' .github/FUNDING.yml; then
            echo "::error::.github/FUNDING.yml has no sponsor/payment links"; fail=1
          fi
          [ "$fail" -eq 0 ] && echo "✓ All required OSS community & licensing files present." || exit 1
